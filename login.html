<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | ChaiCode Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Inter", sans-serif; background: #111; min-height: 100vh; display: flex; flex-direction: column; }

      nav {
        background: #111; padding: 0 48px; height: 68px;
        display: flex; align-items: center; justify-content: space-between;
        border-bottom: 1px solid #222;
      }
      .nav-logo { font-size: 20px; font-weight: 800; color: white; letter-spacing: -0.5px; text-decoration: none; }
      .nav-logo span { color: #e23744; }

      .page {
        flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px;
      }

      .card {
        background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px;
        width: 100%; max-width: 400px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      }

      .card-title { font-size: 24px; font-weight: 800; color: white; margin-bottom: 6px; }
      .card-sub { font-size: 14px; color: #666; margin-bottom: 32px; }

      .input-wrap { margin-bottom: 16px; }
      .input-wrap label { display: block; font-size: 12px; font-weight: 600; color: #888; letter-spacing: 0.5px; margin-bottom: 8px; text-transform: uppercase; }

      .input-wrap input {
        width: 100%; padding: 13px 16px;
        background: #111; border: 1.5px solid #2a2a2a; border-radius: 8px;
        color: white; font-family: "Inter", sans-serif; font-size: 15px;
        outline: none; transition: border 0.2s;
      }
      .input-wrap input:focus { border-color: #e23744; }
      .input-wrap input::placeholder { color: #444; }

      .btn {
        width: 100%; padding: 14px; background: #e23744; color: white; border: none;
        border-radius: 8px; font-family: "Inter", sans-serif; font-size: 15px;
        font-weight: 700; cursor: pointer; transition: background 0.2s; margin-top: 4px;
      }
      .btn:hover { background: #c0202e; }
      .btn:disabled { opacity: 0.6; cursor: not-allowed; }

      .footer-text { text-align: center; font-size: 13px; color: #555; margin-top: 20px; }
      .footer-text a { color: #e23744; font-weight: 600; text-decoration: none; }

      .divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
      .divider-line { flex: 1; height: 1px; background: #222; }
      .divider span { color: #444; font-size: 12px; }

      .msg { padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
      .msg.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; display: block; }
      .msg.error { background: rgba(226,55,68,0.1); border: 1px solid rgba(226,55,68,0.3); color: #f87171; display: block; }

      /* Mobile */
      @media (max-width: 480px) {
        nav { padding: 0 16px; height: 56px; }
        .nav-logo { font-size: 16px; }
        .card { padding: 28px 20px; }
        .card-title { font-size: 20px; }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/movies" class="nav-logo">chaicode <span>cinema</span></a>
    </nav>

    <div class="page">
      <div class="card">
        <div class="card-title">Welcome back 👋</div>
        <div class="card-sub">Sign in to book your seats</div>

        <div id="msg" class="msg"></div>

        <div class="input-wrap">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="off" />
        </div>
        <div class="input-wrap">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <button class="btn" id="btn" onclick="login()">Sign In</button>

        <div class="divider">
          <div class="divider-line"></div>
          <span>or</span>
          <div class="divider-line"></div>
        </div>

        <div class="footer-text">
          Don't have an account? <a href="/register">Create one</a>
        </div>
      </div>
    </div>

    <script>
      if (localStorage.getItem("token")) { window.location.href = "/movies"; }

      async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("btn");
        const msg = document.getElementById("msg");

        msg.className = "msg"; msg.textContent = "";

        if (!username || !password) {
          msg.className = "msg error"; msg.textContent = "Please fill in all fields."; return;
        }

        btn.disabled = true; btn.textContent = "Signing in...";

        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (data.error) {
            msg.className = "msg error"; msg.textContent = data.error;
          } else {
            localStorage.setItem("token", data.token);
            localStorage.setItem("username", username);
            msg.className = "msg success";
            msg.textContent = "Login successful! Redirecting...";
            setTimeout(() => window.location.href = "/movies", 800);
          }
        } catch (err) {
          msg.className = "msg error"; msg.textContent = "Something went wrong. Please try again.";
        } finally {
          btn.disabled = false; btn.textContent = "Sign In";
        }
      }

      document.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    </script>
  </body>
</html>
